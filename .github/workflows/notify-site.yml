name: Notify personal site

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger personal-site rebuild
        run: gh api repos/pike00/personal-site/dispatches -f event_type=blog-updated
        env:
          GH_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
